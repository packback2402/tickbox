# =============================================
# docker-compose.yml — TiTicket Production
# Kiến trúc theo đồ án: Nginx + Backend + Frontend + PostgreSQL
# =============================================

services:

  # ─── Container 1: PostgreSQL Database ───────────────────────────
  db:
    image: postgres:16-alpine
    container_name: titicket_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - titicket_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Container 2: Backend Node.js + Express ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: titicket_backend
    restart: unless-stopped
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db            # Tên container DB trong Docker network
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE}
      VNPAY_SECRET_KEY: ${VNPAY_SECRET_KEY}
      VNPAY_URL: ${VNPAY_URL}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL}
      PAYMENT_TIMEOUT: ${PAYMENT_TIMEOUT}
      COMMISSION_RATE: ${COMMISSION_RATE}
      EMAIL_SERVICE: ${EMAIL_SERVICE}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      TICKET_SECRET_KEY: ${TICKET_SECRET_KEY}
    volumes:
      - uploads_data:/app/uploads    # Persist ảnh upload
    depends_on:
      db:
        condition: service_healthy
    networks:
      - titicket_net

  # ─── Container 3: Frontend React (build) + Nginx (serve) ────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api   # Nginx sẽ proxy /api → backend
    container_name: titicket_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - titicket_net

  # ─── Container 4: Nginx Reverse Proxy (HTTPS) ───────────────────
  nginx:
    image: nginx:alpine
    container_name: titicket_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - titicket_net

  # ─── Container 5: Certbot (Let's Encrypt SSL) ───────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: titicket_certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    # Chỉ chạy khi cần gia hạn chứng chỉ
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# ─── Volumes persistent ─────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

# ─── Network nội bộ ─────────────────────────────────────────────────
networks:
  titicket_net:
    driver: bridge
