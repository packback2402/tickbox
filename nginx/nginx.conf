# =============================================
# Nginx Reverse Proxy — điểm vào duy nhất
# Nhận HTTPS từ Internet, phân phối đến các container
# =============================================

events {
    worker_connections 1024;
}

http {
    # Nén gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ---- Server HTTP (redirect về HTTPS) ----
    server {
        listen 80;
        server_name titicket.id.vn;   # ← Thay bằng domain thật

        # Cho phép Let's Encrypt xác thực
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect toàn bộ HTTP → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- Server HTTPS ----
    server {
        listen 443 ssl;
        server_name titicket.id.vn;   # ← Thay bằng domain thật

        # Chứng chỉ SSL từ Let's Encrypt (Certbot)
        ssl_certificate     /etc/letsencrypt/live/titicket.id.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/titicket.id.vn/privkey.pem;

        # Cấu hình SSL an toàn
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        # Giới hạn kích thước upload (ảnh sự kiện)
        client_max_body_size 10M;

        # ---- Route /api/* → Backend container (giữ nguyên prefix /api) ----
        location /api {
            proxy_pass         http://backend:5001;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
        }

        # ---- Uploads từ backend (ảnh sự kiện) ----
        location /uploads/ {
            proxy_pass http://backend:5001/uploads/;
            proxy_set_header Host $host;
        }

        # ---- Route còn lại → Frontend container ----
        location / {
            proxy_pass         http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
